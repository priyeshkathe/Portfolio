<!DOCTYPE html>
<html>
<head>
<title>Portfolio Analytics Dashboard</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.card{
background:#1e1e1e;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

.visitor{
border-bottom:1px solid #333;
padding:15px 0;
}

.pages{
margin-left:20px;
color:#ccc;
font-size:14px;
}

</style>

</head>

<body>

<h1>Portfolio Analytics</h1>

<div class="card">

<h2>Total Visitors: <span id="totalVisitors">0</span></h2>
<h2>Total Page Views: <span id="totalViews">0</span></h2>

</div>

<div class="card">

<h2>Visitor Sessions</h2>

<div id="sessions"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyDZZ9CkBdiS0UJGb5UTT7280p-2SrGxOf0",
authDomain:"portfolio-visitor-fbc1e.firebaseapp.com",
databaseURL:"https://portfolio-visitor-fbc1e-default-rtdb.firebaseio.com",
projectId:"portfolio-visitor-fbc1e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* totals */

db.ref("analytics/totals/totalVisitors").on("value",snap=>{
document.getElementById("totalVisitors").innerText = snap.val() || 0;
});

db.ref("analytics/totals/totalPageViews").on("value",snap=>{
document.getElementById("totalViews").innerText = snap.val() || 0;
});

/* sessions */

db.ref("analytics/sessions").on("value",snap=>{

const container = document.getElementById("sessions");

container.innerHTML="";

snap.forEach(child=>{

const id = child.key;

const data = child.val();

const div = document.createElement("div");

div.className="visitor";

div.innerHTML=

"<b>Session:</b> "+id+"<br>"+
"<b>Country:</b> "+(data.country || "Unknown")+"<br>"+
"<b>City:</b> "+(data.city || "Unknown")+"<br>"+
"<b>Device:</b> "+(data.device || "Unknown")+"<br>"+
"<b>Browser:</b> "+(data.browser || "Unknown")+"<br>"+
"<b>Traffic:</b> "+(data.trafficSource || "Direct")+"<br>"+
"<b>First Visit:</b> "+(data.firstVisit || "-")+"<br>"+
"<b>GPS:</b> "+(data.gps ? data.gps.lat+", "+data.gps.lon : "Not allowed")+"<br>"+
"<div class='pages' id='pages_"+id+"'></div>";

container.appendChild(div);

/* page visits */

db.ref("analytics/page_visits/"+id).once("value",snap2=>{

const pages = document.getElementById("pages_"+id);

snap2.forEach(v=>{

const visit = v.val();

const p = document.createElement("div");

p.innerText =
"Page: "+visit.page+" | Time: "+visit.timeSpentSeconds+"s";

pages.appendChild(p);

});

});

});

});

</script>

</body>
</html>
